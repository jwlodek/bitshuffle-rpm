---

name: Build and Publish RPM on Release
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        alma_version: [8, 9, 10]
    container:
      image: almalinux:${{ matrix.alma_version }}
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install config-manager dnf plugin
        run: |
          dnf install -y 'dnf-command(config-manager)'

      - name: On EL8, enable PowerTools repository
        if: matrix.alma_version == '8'
        run: |
          dnf config-manager --set-enabled powertools

      - name: On newer EL versions, enable CRB repository
        if: matrix.alma_version != '8'
        run: |
          dnf config-manager --set-enabled crb

      - name: Enable EPEL repository
        run: |
          dnf install -y epel-release

      - name: Add GitHub CLI repository
        run: |
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo

      - name: Install dependencies
        run: |
          dnf install -y hdf5-devel libzstd-devel gcc make rpmdevtools gh

      - name: Build srpm
        run: |
          make srpm

      - name: Build rpm
        run: |
          make rpm

      - name: Upload rpms to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} *.rpm --clobber
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload srpm to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} *.src.rpm --clobber
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
