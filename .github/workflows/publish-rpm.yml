---

name: Build and Publish RPM on Release
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        alma_version: [8, 9, 10]
    container:
      image: almalinux:${{ matrix.alma_version }}
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable EPEL repository
        run: |
          dnf install -y epel-release

      - name: Install dependencies
        run: |
          dnf install -y hdf5-devel libzstd-devel gcc make

      - name: Build srpm
        run: |
          make srpm

      - name: Build RPM
        run: |
          make rpm
      
      - name: Upload rpms and srpms to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release upload ${{ github.event.release.tag_name }} *.rpm *.src.rpm --clobber
